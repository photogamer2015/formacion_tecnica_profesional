{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Formación Profesional EC</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a237e 50%, #283593 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1), 0 20px 48px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-circle {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: #ffffff;
            object-fit: cover;
            padding: 4px;
            border: 3px solid #fdae11;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            margin: 0 auto 20px;
            display: block;
            transition: transform 0.3s ease;
        }

        .logo-circle:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 22px;
            color: #1a237e;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13.5px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            background: #f8fafc;
            color: #0f172a;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #1a237e;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(26, 35, 126, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(26, 35, 126, 0.25);
        }

        button:hover {
            background: #d7642f;
            box-shadow: 0 6px 16px rgba(215, 100, 47, 0.3);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        .error {
            background: #fef2f2;
            color: #991b1b;
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 500;
            margin-bottom: 24px;
            border-left: 4px solid #ef4444;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            50% {
                transform: translateX(5px);
            }

            75% {
                transform: translateX(-5px);
            }
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 13px;
            font-weight: 500;
        }

        .footer a {
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s ease;
            display: inline-block;
            margin-bottom: 8px;
        }

        .footer a:hover {
            color: #d7642f;
        }

        .footer-divider {
            display: inline-block;
            margin: 0 8px;
            color: #cbd5e1;
        }

        /* ── THEME SELECTOR ── */
        .theme-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }
        .theme-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            padding: 0;
            margin: 0; /* Override */
            box-shadow: none; /* Override */
        }
        .theme-btn:hover { transform: scale(1.15); box-shadow: none; }
        .theme-btn.active { border-color: white; box-shadow: 0 0 10px rgba(255,255,255,0.9); }

        .btn-blue { background: #1a237e; }
        .btn-orange { background: #d7642f; }
        .btn-dark { background: #121212; border: 1px solid rgba(255,255,255,0.3); }

        /* ── THEME: ORANGE ── */
        body.theme-orange {
            background: linear-gradient(135deg, #431407 0%, #d7642f 50%, #ea580c 100%);
        }
        body.theme-orange h1 { color: #d7642f; }
        body.theme-orange input:focus { border-color: #d7642f; box-shadow: 0 0 0 4px rgba(215, 100, 47, 0.15); }
        body.theme-orange button[type="submit"] { background: #d7642f; box-shadow: 0 4px 12px rgba(215, 100, 47, 0.25); }
        body.theme-orange button[type="submit"]:hover { background: #ea580c; }
        body.theme-orange .logo-circle { border-color: #1a237e; }

        /* ── THEME: DARK ── */
        body.theme-dark { background: #121212; }
        body.theme-dark .login-card { background: #1e1e1e; border-color: #333; color: #e0e0e0; }
        body.theme-dark h1 { color: #90caf9; }
        body.theme-dark label { color: #bbb; }
        body.theme-dark .subtitle { color: #888; }
        body.theme-dark input[type="text"], body.theme-dark input[type="password"] {
            background: #2c2c2c; border-color: #444; color: #fff;
        }
        body.theme-dark input:focus { border-color: #90caf9; box-shadow: 0 0 0 4px rgba(144, 202, 249, 0.15); }
        body.theme-dark button[type="submit"] { background: #1a237e; }
        body.theme-dark button[type="submit"]:hover { background: #283593; }
        body.theme-dark .footer a { color: #888; }
        body.theme-dark .footer a:hover { color: #90caf9; }
    </style>
</head>

<body>
    <div class="theme-selector">
        <button type="button" class="theme-btn btn-blue" data-theme="blue" title="Azul (Predefinido)"></button>
        <button type="button" class="theme-btn btn-orange" data-theme="orange" title="Naranja (Logo)"></button>
        <button type="button" class="theme-btn btn-dark" data-theme="dark" title="Oscuro"></button>
    </div>

    <div class="login-card">
        <div class="logo-area">
            <img src="{% static 'logo.png' %}" alt="Logo Formación Profesional EC" class="logo-circle">
            <h1>Formación Profesional EC</h1>
            <div class="subtitle">Sistema de gestión académica</div>
        </div>

        {% if form.errors %}
        <div class="error">
            Usuario o contraseña incorrectos. Inténtalo de nuevo.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Usuario</label>
                <input type="text" name="username" id="id_username" placeholder="Ingresa tu usuario" autofocus required>
            </div>
            <div class="form-group">
                <label for="id_password">Contraseña</label>
                <input type="password" name="password" id="id_password" placeholder="••••••••" required>
            </div>
            <button type="submit">Iniciar sesión</button>
        </form>

        <div class="footer">
            <a href="https://formacionprofessional.com/" target="_blank">formacionprofessional.ec</a>
        </div>
    </div>

    <script>
        const body = document.body;
        const themeBtns = document.querySelectorAll('.theme-btn');
        
        // Cargar tema guardado o azul por defecto
        const savedLoginTheme = localStorage.getItem('loginTheme') || 'blue';
        applyTheme(savedLoginTheme);

        themeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const theme = btn.getAttribute('data-theme');
                applyTheme(theme);
                localStorage.setItem('loginTheme', theme);
            });
        });

        function applyTheme(theme) {
            // Limpiar clases de tema previas
            body.classList.remove('theme-orange', 'theme-dark');
            
            // Aplicar nueva si no es el azul por defecto
            if (theme !== 'blue') {
                body.classList.add(`theme-${theme}`);
            }

            // Actualizar botones (borde blanco para el activo)
            themeBtns.forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`.theme-btn[data-theme="${theme}"]`);
            if (activeBtn) activeBtn.classList.add('active');
        }
    </script>
</body>

</html>
